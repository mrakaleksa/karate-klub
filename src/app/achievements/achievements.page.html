<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
        <ion-back-button defaultHref="/home"></ion-back-button>       
    </ion-buttons>
    <div class="toolbar-content">
      <img src="assets/images/kkobilic-logo.png" class="club-logo" />
      <span class="club-title">Karate klub Obilic</span>
    </div>
    <ion-buttons slot="end">
      <ion-button (click)="onAddAchievement()">Add</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="page-title">
    Achievements
  </div>
  <ion-list>
    <ion-item *ngFor="let a of achievements">
      <ion-label>
        {{ a.memberName }} - {{ a.competition }} ({{ a.placement }})
      </ion-label>
    </ion-item>
  </ion-list>

</ion-content>
